packages:
  - .

# Auto-generated by pnpm (pnpm approve-builds). Pre-approves build scripts
# for the packages C3 itself installs: `workerd` downloads the platform
# binary, `esbuild` and `sharp` (via miniflare) download/build native
# bindings. Required on CI (e.g. Cloudflare's pnpm 10.x) where there is no
# interactive prompt to approve builds.
allowBuilds:
  esbuild: true
  workerd: true
  sharp: true
